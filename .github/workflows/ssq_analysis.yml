name: 双色球概率分析

on:
  schedule:
    # 每周一、三、五 北京时间 09:00（UTC+8 = UTC 01:00）
    - cron: '0 1 * * 1,3,5'
  workflow_dispatch:  # 支持手动触发

jobs:
  analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run SSQ analysis and send email
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: |
          python ssq_scheduler.py

      - name: Upload report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ssq-report
          path: ssq_report.html
          retention-days: 30
